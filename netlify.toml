[build]
  command = "flutter build web --release"
  publish = "build/web"
  base = "/"

[build.environment]
  FLUTTER_VERSION = "3.10.0"
  DART_VERSION = "3.0.0"
  NODE_VERSION = "18"

# Flutter Plugin (handles SDK installation)
[[plugins]]
  package = "@netlify/plugin-flutter"
  [plugins.inputs]
    version = "3.10.0"

# Cache Flutter dependencies
[[plugins]]
  package = "@netlify/plugin-cache"
  [plugins.inputs]
    paths = [
      ".pub-cache",
      "build/web",
    ]

# Lighthouse Plugin (optional for SEO)
[[plugins]]
  package = "@netlify/plugin-lighthouse"
  [plugins.inputs]
    outputPath = "reports/lighthouse.html"
